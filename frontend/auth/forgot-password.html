<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Date Request Platform</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--gradient-bg-light); padding:var(--space-6); }
    .auth-card { width:100%; max-width:420px; padding:var(--space-10) var(--space-8); text-align:center; }
    .auth-logo { font-family:var(--font-display); font-size:var(--text-3xl); font-weight:700; color:var(--color-primary); margin-bottom:var(--space-2); }
    .auth-title { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--color-text-primary); margin-bottom:var(--space-2); }
    .auth-sub { color:var(--color-text-muted); font-size:var(--text-sm); margin-bottom:var(--space-8); }
    .input-wrap { position:relative; text-align:left; }
    .input-icon { position:absolute; left:var(--space-4); top:50%; transform:translateY(-50%); pointer-events:none; }
    .input-with-icon { padding-left:44px; }
    .back-link { display:inline-flex; align-items:center; gap:var(--space-2); color:var(--color-primary); font-size:var(--text-sm); font-weight:600; margin-top:var(--space-4); }
    .back-link:hover { text-decoration:underline; }
  </style>
</head>
<body>
<div class="blobs-container" aria-hidden="true"><div class="blob blob-1"></div><div class="blob blob-2"></div></div>
<button class="theme-toggle" id="theme-btn" style="position:fixed;top:16px;right:16px;z-index:999;" aria-label="Toggle dark mode">🌙</button>

<div class="glass-card auth-card animate-fade-in-up">
  <div class="auth-logo">💌 DateRequest</div>

  <!-- Forgot Form -->
  <div id="forgot-form">
    <div style="font-size:3rem;margin-bottom:var(--space-4);" aria-hidden="true">🔐</div>
    <h1 class="auth-title">Forgot Password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link</p>
    <form onsubmit="handleForgotPassword(event)" novalidate>
      <div class="form-group" style="margin-bottom:var(--space-5);text-align:left;">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">📧</span>
          <input class="form-input input-with-icon" type="email" id="email"
                 placeholder="your@email.com" autocomplete="email" required
                 oninput="clearFieldError('email')" />
        </div>
        <span class="form-error" id="email-error" style="display:none;" role="alert"></span>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="forgot-btn" style="justify-content:center;">
        Send Reset Link 📧
      </button>
    </form>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>

  <!-- Success State -->
  <div id="forgot-success" class="hidden">
    <div style="font-size:3rem;margin-bottom:var(--space-4);" aria-hidden="true">✅</div>
    <h2 style="font-family:var(--font-display);color:var(--color-success);margin-bottom:var(--space-3);">Check your inbox!</h2>
    <p style="color:var(--color-text-secondary);margin-bottom:var(--space-6);">
      We sent a password reset link to your email. Check your spam folder if you don't see it.
    </p>
    <a href="login.html" class="btn btn-primary" style="display:inline-flex;">Back to Login 💕</a>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  document.getElementById('theme-btn').addEventListener('click', () => applyTheme(APP.theme === 'dark' ? 'light' : 'dark'));
</script>
</body>
</html>
