<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Date Request Platform</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,450;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth-theme.css" />
  <style>
    .auth-card { text-align:center; }
    .input-wrap { position:relative; text-align:left; }
    .input-icon { position:absolute; left:var(--space-4); top:50%; transform:translateY(-50%); pointer-events:none; }
    .input-with-icon { padding-left:44px; }
    .back-link { display:inline-flex; align-items:center; gap:var(--space-2); font-size:var(--text-sm); font-weight:600; margin-top:var(--space-4); }
    .back-link:hover { text-decoration:underline; }
    .auth-icon-ring {
      width: 60px; height: 60px; border-radius: 50%;
      border: 1px solid var(--auth-gold-soft);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-5); color: var(--auth-gold);
    }
  </style>
</head>
<body class="auth-body">
<button class="theme-toggle" id="theme-btn" style="position:fixed;top:16px;right:16px;z-index:999;" aria-label="Toggle dark mode">🌙</button>

<div class="glass-card auth-card">
  <div class="auth-brand" style="justify-content:center;margin-bottom:var(--space-6);">
    <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="12" stroke="currentColor" stroke-width="1.1"/><path d="M13 17.2s-5.4-3.4-5.4-7.1a3 3 0 0 1 5.4-1.8 3 3 0 0 1 5.4 1.8c0 3.7-5.4 7.1-5.4 7.1Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
    Date Request
  </div>

  <!-- Forgot Form -->
  <div id="forgot-form">
    <div class="auth-icon-ring" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="11" width="14" height="9" rx="2"/><path d="M8 11V8a4 4 0 0 1 8 0v3"/></svg>
    </div>
    <h1 class="auth-title">Forgot Password?</h1>
    <p class="auth-sub">Enter your email and we'll send you a reset link</p>
    <form onsubmit="handleForgotPassword(event)" novalidate>
      <div class="form-group" style="margin-bottom:var(--space-5);text-align:left;">
        <label class="form-label" for="email">Email Address</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">📧</span>
          <input class="form-input input-with-icon" type="email" id="email"
                 placeholder="your@email.com" autocomplete="email" required
                 oninput="clearFieldError('email')" />
        </div>
        <span class="form-error" id="email-error" style="display:none;" role="alert"></span>
      </div>
      <button type="submit" class="btn btn-primary w-full" id="forgot-btn" style="justify-content:center;">
        Send Reset Link
      </button>
    </form>
    <a href="login.html" class="back-link">← Back to Login</a>
  </div>

  <!-- Success State -->
  <div id="forgot-success" class="hidden">
    <div class="auth-icon-ring" aria-hidden="true">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 6L9 17l-5-5"/></svg>
    </div>
    <h2 style="font-family:var(--auth-display);font-weight:500;color:var(--auth-ink);margin-bottom:var(--space-3);">Check your inbox</h2>
    <p style="color:var(--auth-muted);margin-bottom:var(--space-6);">
      We sent a password reset link to your email. Check your spam folder if you don't see it.
    </p>
    <a href="login.html" class="btn btn-primary" style="display:inline-flex;">Back to Login</a>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
</body>
</html>
