<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Date Request Platform</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <style>
    body { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--gradient-bg-light); padding: var(--space-6); }
    .auth-card { width: 100%; max-width: 440px; padding: var(--space-10) var(--space-8); }
    .auth-logo { font-family: var(--font-display); font-size: var(--text-3xl); font-weight: 700; color: var(--color-primary); text-align: center; margin-bottom: var(--space-2); }
    .auth-tagline { text-align: center; color: var(--color-text-muted); font-size: var(--text-sm); margin-bottom: var(--space-8); }
    .auth-title { font-family: var(--font-display); font-size: var(--text-2xl); font-weight: 700; color: var(--color-text-primary); margin-bottom: var(--space-6); text-align: center; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: var(--space-4); top: 50%; transform: translateY(-50%); font-size: 1rem; pointer-events: none; }
    .input-with-icon { padding-left: 44px; }
    .toggle-pass { position: absolute; right: var(--space-4); top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; }
    .divider { display: flex; align-items: center; gap: var(--space-3); margin: var(--space-5) 0; color: var(--color-text-muted); font-size: var(--text-sm); }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(255,107,157,0.15); }
    .auth-footer { text-align: center; margin-top: var(--space-6); font-size: var(--text-sm); color: var(--color-text-muted); }
    .auth-footer a { color: var(--color-primary); font-weight: 700; }
    .auth-footer a:hover { text-decoration: underline; }
    .remember-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: var(--space-5); }
    .checkbox-label { display: flex; align-items: center; gap: var(--space-2); font-size: var(--text-sm); color: var(--color-text-secondary); cursor: pointer; }
    .forgot-link { font-size: var(--text-sm); color: var(--color-primary); font-weight: 600; }
    .forgot-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="blobs-container" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
</div>
<button class="theme-toggle" id="theme-btn" style="position:fixed;top:16px;right:16px;z-index:999;" aria-label="Toggle dark mode">🌙</button>

<div class="glass-card auth-card animate-fade-in-up">
  <div class="auth-logo">💌 DateRequest</div>
  <p class="auth-tagline">Create magical date moments ✨</p>
  <h1 class="auth-title">Welcome Back 💕</h1>

  <form id="login-form" onsubmit="handleLogin(event)" novalidate>
    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="identifier">Email or Username</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">👤</span>
        <input class="form-input input-with-icon" type="text" id="identifier"
               placeholder="your@email.com or username"
               autocomplete="username" required
               oninput="clearFieldError('identifier')" />
      </div>
      <span class="form-error" id="identifier-error" style="display:none;" role="alert"></span>
    </div>

    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">🔒</span>
        <input class="form-input input-with-icon" type="password" id="password"
               placeholder="Your password"
               autocomplete="current-password" required
               oninput="clearFieldError('password')" />
        <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('password', this)" aria-label="Toggle password visibility">👁️</button>
      </div>
      <span class="form-error" id="password-error" style="display:none;" role="alert"></span>
    </div>

    <div class="remember-row">
      <label class="checkbox-label">
        <input type="checkbox" id="remember-me" />
        Remember me for 30 days
      </label>
      <a href="forgot-password.html" class="forgot-link">Forgot password?</a>
    </div>

    <button type="submit" class="btn btn-primary w-full" id="login-btn" style="justify-content:center;">
      Login 💕
    </button>
  </form>

  <div class="auth-footer">
    Don't have an account? <a href="register.html">Sign up free ✨</a>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  document.getElementById('theme-btn').addEventListener('click', () => applyTheme(APP.theme === 'dark' ? 'light' : 'dark'));
</script>
</body>
</html>
