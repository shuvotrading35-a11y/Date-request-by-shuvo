<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register — Date Request Platform</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <style>
    body { min-height:100vh; display:flex; align-items:center; justify-content:center; background:var(--gradient-bg-light); padding:var(--space-6); }
    .auth-card { width:100%; max-width:480px; padding:var(--space-10) var(--space-8); }
    .auth-logo { font-family:var(--font-display); font-size:var(--text-3xl); font-weight:700; color:var(--color-primary); text-align:center; margin-bottom:var(--space-2); }
    .auth-tagline { text-align:center; color:var(--color-text-muted); font-size:var(--text-sm); margin-bottom:var(--space-8); }
    .auth-title { font-family:var(--font-display); font-size:var(--text-2xl); font-weight:700; color:var(--color-text-primary); margin-bottom:var(--space-6); text-align:center; }
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:var(--space-4); top:50%; transform:translateY(-50%); font-size:1rem; pointer-events:none; }
    .input-with-icon { padding-left:44px; }
    .toggle-pass { position:absolute; right:var(--space-4); top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; }
    .strength-bar-track { width:100%; height:4px; background:rgba(255,107,157,0.1); border-radius:var(--radius-full); margin-top:var(--space-2); overflow:hidden; }
    .strength-bar-fill { height:100%; width:0; border-radius:var(--radius-full); }
    .strength-label { font-size:var(--text-xs); font-weight:600; margin-top:4px; }
    .terms-row { display:flex; align-items:flex-start; gap:var(--space-3); margin:var(--space-5) 0; }
    .terms-row input { margin-top:3px; flex-shrink:0; accent-color:var(--color-primary); }
    .terms-row label { font-size:var(--text-sm); color:var(--color-text-secondary); line-height:1.5; }
    .terms-row a { color:var(--color-primary); font-weight:600; }
    .auth-footer { text-align:center; margin-top:var(--space-6); font-size:var(--text-sm); color:var(--color-text-muted); }
    .auth-footer a { color:var(--color-primary); font-weight:700; }
    .username-status { font-size:var(--text-xs); font-weight:600; margin-top:4px; min-height:1em; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:var(--space-4); }
    @media(max-width:480px){ .form-row { grid-template-columns:1fr; } }
  </style>
</head>
<body>
<div class="blobs-container" aria-hidden="true">
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>
</div>
<button class="theme-toggle" id="theme-btn" style="position:fixed;top:16px;right:16px;z-index:999;" aria-label="Toggle dark mode">🌙</button>

<div class="glass-card auth-card animate-fade-in-up">
  <div class="auth-logo">💌 DateRequest</div>
  <p class="auth-tagline">Start creating magical moments ✨</p>
  <h1 class="auth-title">Create Account 💕</h1>

  <form id="register-form" onsubmit="handleRegister(event)" novalidate>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="full-name">Full Name</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">✨</span>
          <input class="form-input input-with-icon" type="text" id="full-name"
                 placeholder="Your name" autocomplete="name" required
                 oninput="clearFieldError('full-name')" />
        </div>
        <span class="form-error" id="full-name-error" style="display:none;" role="alert"></span>
      </div>

      <div class="form-group" style="margin-bottom:var(--space-4);">
        <label class="form-label" for="username">Username</label>
        <div class="input-wrap">
          <span class="input-icon" aria-hidden="true">@</span>
          <input class="form-input input-with-icon" type="text" id="username"
                 placeholder="cooluser123" autocomplete="username" required
                 oninput="clearFieldError('username'); checkUsername(this.value)" />
        </div>
        <div class="username-status" id="username-status" aria-live="polite"></div>
        <span class="form-error" id="username-error" style="display:none;" role="alert"></span>
      </div>
    </div>

    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="email">Email Address</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">📧</span>
        <input class="form-input input-with-icon" type="email" id="email"
               placeholder="your@email.com" autocomplete="email" required
               oninput="clearFieldError('email')" />
      </div>
      <span class="form-error" id="email-error" style="display:none;" role="alert"></span>
    </div>

    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="password">Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">🔒</span>
        <input class="form-input input-with-icon" type="password" id="password"
               placeholder="Min. 8 characters" autocomplete="new-password" required
               oninput="clearFieldError('password'); updateStrengthUI(this.value)" />
        <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('password', this)" aria-label="Show password">👁️</button>
      </div>
      <div class="strength-bar-track" aria-hidden="true">
        <div class="strength-bar-fill" id="strength-bar"></div>
      </div>
      <div class="strength-label" id="strength-label" aria-live="polite"></div>
      <span class="form-error" id="password-error" style="display:none;" role="alert"></span>
    </div>

    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">🔐</span>
        <input class="form-input input-with-icon" type="password" id="confirm-password"
               placeholder="Repeat your password" autocomplete="new-password" required
               oninput="clearFieldError('confirm-password')" />
        <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('confirm-password', this)" aria-label="Show confirm password">👁️</button>
      </div>
      <span class="form-error" id="confirm-password-error" style="display:none;" role="alert"></span>
    </div>

    <div class="terms-row">
      <input type="checkbox" id="terms" required />
      <label for="terms">
        I agree to the <a href="#" onclick="return false;">Terms of Service</a> and
        <a href="#" onclick="return false;">Privacy Policy</a>
      </label>
    </div>

    <button type="submit" class="btn btn-primary w-full" id="register-btn" style="justify-content:center;">
      Create Account ✨
    </button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="login.html">Login 💕</a>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  document.getElementById('theme-btn').addEventListener('click', () => applyTheme(APP.theme === 'dark' ? 'light' : 'dark'));
</script>
</body>
</html>
