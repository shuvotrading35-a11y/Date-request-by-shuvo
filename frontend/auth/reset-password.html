<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Date Request Platform</title>
  <link rel="stylesheet" href="../assets/css/tokens.css" />
  <link rel="stylesheet" href="../assets/css/global.css" />
  <link rel="stylesheet" href="../assets/css/animations.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,450;0,9..144,600;1,9..144,500&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/auth-theme.css" />
  <style>
    .input-wrap { position:relative; }
    .input-icon { position:absolute; left:var(--space-4); top:50%; transform:translateY(-50%); pointer-events:none; }
    .input-with-icon { padding-left:44px; }
    .toggle-pass { position:absolute; right:var(--space-4); top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:1rem; }
    .strength-bar-track { width:100%; height:4px; background:rgba(139,100,112,0.15); border-radius:var(--radius-full); margin-top:var(--space-2); overflow:hidden; }
    .strength-bar-fill { height:100%; width:0; border-radius:var(--radius-full); transition: width 0.4s ease, background 0.4s ease; }
    .strength-label { font-size:var(--text-xs); font-weight:600; margin-top:4px; }
    .auth-icon-ring {
      width: 56px; height: 56px; border-radius: 50%;
      border: 1px solid var(--auth-gold-soft);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto var(--space-5); color: var(--auth-gold);
    }
  </style>
</head>
<body class="auth-body">
<button class="theme-toggle" id="theme-btn" style="position:fixed;top:16px;right:16px;z-index:999;" aria-label="Toggle dark mode">🌙</button>

<div class="glass-card auth-card">
  <div class="auth-brand" style="justify-content:center;margin-bottom:var(--space-6);">
    <svg width="22" height="22" viewBox="0 0 26 26" fill="none"><circle cx="13" cy="13" r="12" stroke="currentColor" stroke-width="1.1"/><path d="M13 17.2s-5.4-3.4-5.4-7.1a3 3 0 0 1 5.4-1.8 3 3 0 0 1 5.4 1.8c0 3.7-5.4 7.1-5.4 7.1Z" stroke="currentColor" stroke-width="1.1" stroke-linejoin="round"/></svg>
    Date Request
  </div>
  <div class="auth-icon-ring" aria-hidden="true">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="15" r="4"/><path d="M10.5 12.5 20 3l1.5 1.5L18 8l2 2-2.5 2.5-2-2-1.5 1.5"/></svg>
  </div>
  <h1 class="auth-title">Set New Password</h1>
  <p class="auth-sub">Choose a strong password for your account</p>

  <form onsubmit="handleResetPassword(event)" novalidate>
    <div class="form-group" style="margin-bottom:var(--space-4);">
      <label class="form-label" for="password">New Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">🔒</span>
        <input class="form-input input-with-icon" type="password" id="password"
               placeholder="Min. 8 characters" autocomplete="new-password" required
               oninput="clearFieldError('password'); updateStrengthUI(this.value)" />
        <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('password', this)" aria-label="Show password">👁️</button>
      </div>
      <div class="strength-bar-track" aria-hidden="true">
        <div class="strength-bar-fill" id="strength-bar"></div>
      </div>
      <div class="strength-label" id="strength-label" aria-live="polite"></div>
      <span class="form-error" id="password-error" style="display:none;" role="alert"></span>
    </div>

    <div class="form-group" style="margin-bottom:var(--space-6);">
      <label class="form-label" for="confirm-password">Confirm Password</label>
      <div class="input-wrap">
        <span class="input-icon" aria-hidden="true">🔐</span>
        <input class="form-input input-with-icon" type="password" id="confirm-password"
               placeholder="Repeat new password" autocomplete="new-password" required
               oninput="clearFieldError('confirm-password')" />
        <button type="button" class="toggle-pass" onclick="togglePasswordVisibility('confirm-password', this)" aria-label="Show confirm password">👁️</button>
      </div>
      <span class="form-error" id="confirm-password-error" style="display:none;" role="alert"></span>
    </div>

    <button type="submit" class="btn btn-primary w-full" id="reset-btn" style="justify-content:center;">
      Reset Password
    </button>
  </form>

  <div style="text-align:center;margin-top:var(--space-5);">
    <a href="login.html" style="font-size:var(--text-sm);font-weight:600;">← Back to Login</a>
  </div>
</div>

<div id="toast-container" aria-live="polite"></div>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/app.js"></script>
<script src="../assets/js/auth.js"></script>
<script>
  // Validate token exists in URL
  const token = new URLSearchParams(window.location.search).get('token');
  if (!token) {
    showToast('Invalid reset link. Please request a new one.', 'error');
    setTimeout(() => window.location.href = 'forgot-password.html', 2000);
  }
</script>
</body>
</html>
